<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kimi K2.6 — Premium Suite | Filmexplian</title>
  <style>
    :root{
      --bg:#f7f7fa;
      --card:#ffffff;
      --line:#ececf3;
      --text:#17181c;
      --muted:#7b8190;
      --muted-2:#9aa0af;
      --shadow:0 10px 30px rgba(13,18,30,.06);
      --soft-shadow:0 20px 50px rgba(40,44,63,.08);
      --purple:#7c4dff;
      --purple-2:#935bff;
      --chip:#fbfbfe;
      --blue:#58a6ff;
      --dark:#12141c;
      --sheet:#f7f8fc;
      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:16px;
      --radius-sm:12px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:linear-gradient(180deg,#fafafd 0%,#f3f4f9 100%);
      color:var(--text);
      overflow:hidden;
    }

    button,input,textarea{font:inherit}
    button{border:none;background:none;cursor:pointer}
    a{text-decoration:none;color:inherit}

    .app{
      height:100vh;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .phone{
      width:min(100%, 520px);
      height:min(100vh - 36px, 960px);
      background:var(--card);
      border:1px solid rgba(20,24,35,.04);
      border-radius:34px;
      box-shadow:0 40px 100px rgba(15,20,35,.12);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    .topbar{
      padding:18px 18px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background:rgba(255,255,255,.92);
      position:relative;
      z-index:3;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .icon-btn{
      width:36px;
      height:36px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#20232c;
      transition:.18s ease;
      flex:0 0 auto;
    }

    .icon-btn:hover{background:#f3f4f8}

    .title-trigger{
      display:flex;
      align-items:center;
      gap:6px;
      min-width:0;
      text-align:left;
    }

    .title-wrap{min-width:0}
    .top-title{
      font-size:18px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .live-badge{
      font-size:10px;
      font-weight:700;
      color:#fff;
      background:linear-gradient(135deg,#7c4dff,#a45cff);
      padding:3px 7px;
      border-radius:999px;
      letter-spacing:.04em;
    }

    .top-sub{
      font-size:11px;
      color:var(--muted);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .top-right{
      display:flex;
      align-items:center;
      gap:6px;
      flex:0 0 auto;
    }

    .main{
      flex:1;
      min-height:0;
      overflow:auto;
      padding:0 18px 0;
      position:relative;
      -webkit-overflow-scrolling:touch;
    }

    .home-view{
      min-height:100%;
      padding-top:18px;
      padding-bottom:150px;
    }

    .kimi-logo{
      width:58px;
      height:58px;
      border-radius:50%;
      background:
        radial-gradient(circle at 35% 30%, #9fcdff, #58a6ff 58%, #4b6dff 100%);
      box-shadow:
        inset 0 8px 12px rgba(255,255,255,.32),
        0 18px 30px rgba(88,166,255,.24);
      position:relative;
      margin-bottom:22px;
    }

    .kimi-logo::before,
    .kimi-logo::after{
      content:"";
      position:absolute;
      top:18px;
      width:6px;
      height:10px;
      border-radius:999px;
      background:#fff7b5;
      box-shadow:0 0 8px rgba(255,255,255,.45);
    }

    .kimi-logo::before{left:16px}
    .kimi-logo::after{left:28px}

    .welcome-text{
      font-size:15px;
      line-height:1.75;
      color:#20242d;
      max-width:95%;
    }

    .feature-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:28px;
    }

    .feature-pill{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      font-size:14px;
      text-align:left;
      box-shadow:0 4px 12px rgba(30,34,48,.03);
    }

    .chat-view{
      display:none;
      min-height:100%;
      padding-top:10px;
      padding-bottom:150px;
    }

    .chat-view.active{
      display:block;
    }

    .messages{
      display:flex;
      flex-direction:column;
      gap:14px;
      padding-bottom:10px;
    }

    .message{
      display:flex;
      gap:10px;
      align-items:flex-start;
      animation:fadeIn .22s ease;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:none}
    }

    .message.user{
      justify-content:flex-end;
    }

    .message.user .avatar{
      order:2;
      background:#ece7ff;
      color:#5f35f5;
    }

    .message.user .bubble{
      order:1;
      background:linear-gradient(135deg,#7c4dff,#9b63ff);
      color:#fff;
      border:none;
    }

    .avatar{
      width:34px;
      height:34px;
      border-radius:50%;
      background:#f0f3fb;
      border:1px solid #edf1f7;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      font-size:14px;
    }

    .bubble{
      max-width:82%;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:13px 14px;
      font-size:14px;
      line-height:1.65;
      color:#1e2430;
      box-shadow:0 8px 20px rgba(20,26,40,.04);
      word-break:break-word;
    }

    .bubble pre{
      background:#10131b;
      color:#eef2ff;
      padding:12px;
      border-radius:12px;
      overflow:auto;
      margin-top:8px;
      font-size:12px;
    }

    .bubble code{
      background:#f1f3f8;
      padding:2px 6px;
      border-radius:7px;
      font-size:12px;
    }

    .bottom-wrap{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:8px 12px 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.7) 12%, rgba(255,255,255,.96) 38%, #fff 100%);
      z-index:4;
    }

    .quick-row{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:0 4px 10px;
      scrollbar-width:none;
    }
    .quick-row::-webkit-scrollbar{display:none}

    .quick-chip{
      white-space:nowrap;
      background:#fff;
      border:1px solid var(--line);
      color:#20242d;
      padding:9px 13px;
      border-radius:13px;
      font-size:13px;
      box-shadow:0 6px 18px rgba(30,34,48,.04);
      transition:.18s ease;
    }

    .quick-chip:hover{
      transform:translateY(-1px);
      background:#fafaff;
    }

    .composer{
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:8px 8px 8px 10px;
      box-shadow:0 14px 28px rgba(18,22,30,.06);
    }

    .composer-left{
      width:34px;
      height:34px;
      border-radius:50%;
      background:#f5f7fd;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      color:#1d2430;
      font-size:17px;
    }

    .composer textarea{
      flex:1;
      min-height:24px;
      max-height:120px;
      border:none;
      outline:none;
      resize:none;
      background:transparent;
      color:#17181c;
      font-size:15px;
      line-height:1.45;
      padding:8px 0;
    }

    .composer textarea::placeholder{
      color:#858b98;
    }

    .composer-action{
      width:38px;
      height:38px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      font-size:18px;
      color:#1e2430;
      transition:.18s ease;
    }

    .composer-action.primary{
      background:linear-gradient(135deg,#7c4dff,#9b63ff);
      color:#fff;
      box-shadow:0 10px 22px rgba(124,77,255,.28);
    }

    .composer-action.secondary{
      background:#f5f7fd;
      color:#1e2430;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(25,29,40,.28);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      opacity:0;
      visibility:hidden;
      transition:.2s ease;
      z-index:20;
    }

    .overlay.show{
      opacity:1;
      visibility:visible;
    }

    .drawer{
      position:absolute;
      top:0;
      bottom:0;
      left:0;
      width:min(88%, 360px);
      background:#fff;
      z-index:25;
      transform:translateX(-100%);
      transition:.24s ease;
      border-top-right-radius:24px;
      border-bottom-right-radius:24px;
      box-shadow:0 30px 80px rgba(17,20,29,.16);
      padding:18px 14px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .drawer.show{
      transform:translateX(0);
    }

    .drawer-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
    }

    .profile-card{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .profile-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .profile-avatar{
      width:46px;
      height:46px;
      border-radius:50%;
      background:#556172;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      flex:0 0 auto;
    }

    .profile-name{
      font-size:16px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .drawer-link{
      width:100%;
      text-align:left;
      padding:14px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font-size:15px;
    }

    .drawer-link .left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .mini-badge{
      font-size:11px;
      padding:2px 6px;
      border-radius:999px;
      background:#eef7ff;
      color:#4f79ff;
      border:1px solid #dfeaff;
    }

    .history-section{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      min-height:0;
      flex:1;
      overflow:auto;
    }

    .history-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
      gap:10px;
    }

    .history-top strong{
      font-size:15px;
    }

    .search-mini{
      color:var(--muted);
      font-size:14px;
    }

    .history-date{
      color:var(--muted-2);
      font-size:13px;
      margin-bottom:10px;
    }

    .history-item{
      padding:10px 4px;
      border-bottom:1px solid #f2f3f8;
      font-size:14px;
      line-height:1.5;
      cursor:pointer;
    }

    .history-item:last-child{border-bottom:none}

    .model-menu{
      position:absolute;
      top:62px;
      left:70px;
      right:70px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:0 26px 60px rgba(21,24,35,.12);
      z-index:30;
      padding:8px;
      opacity:0;
      transform:translateY(-6px);
      visibility:hidden;
      transition:.2s ease;
    }

    .model-menu.show{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
    }

    .model-option{
      width:100%;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      text-align:left;
      padding:14px;
      border-radius:16px;
      transition:.18s ease;
    }

    .model-option:hover{
      background:#f7f8fd;
    }

    .model-option.active{
      background:#f7f4ff;
    }

    .model-option strong{
      display:block;
      font-size:16px;
    }

    .model-option span{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.5;
    }

    .check{
      color:#4385ff;
      font-weight:700;
      padding-top:2px;
      opacity:0;
    }

    .model-option.active .check{
      opacity:1;
    }

    .sheet{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      background:var(--sheet);
      border-top-left-radius:26px;
      border-top-right-radius:26px;
      box-shadow:0 -20px 60px rgba(17,20,29,.12);
      z-index:35;
      transform:translateY(105%);
      transition:.24s ease;
      padding:10px 14px 18px;
      max-height:82%;
      overflow:auto;
    }

    .sheet.show{
      transform:translateY(0);
    }

    .sheet-handle{
      width:68px;
      height:5px;
      border-radius:999px;
      background:#d5d9e6;
      margin:4px auto 12px;
    }

    .sheet-title{
      font-size:24px;
      font-weight:800;
      margin-bottom:16px;
    }

    .attach-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin-bottom:14px;
    }

    .attach-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 10px;
      text-align:center;
      min-height:100px;
      box-shadow:0 6px 14px rgba(20,26,40,.04);
    }

    .attach-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#f4f6fb;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 10px;
      font-size:20px;
    }

    .sheet-row{
      width:100%;
      text-align:left;
      padding:15px 16px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-top:12px;
    }

    .sheet-row-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .sheet-row small{
      display:block;
      color:var(--muted);
      margin-top:3px;
      font-size:12px;
    }

    .usage-card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
    }

    .usage-card strong{
      font-size:18px;
      display:block;
    }

    .progress{
      height:9px;
      border-radius:999px;
      overflow:hidden;
      background:#eef1f7;
      margin-top:12px;
    }

    .progress > div{
      width:1.04%;
      min-width:10px;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg,#5aa8ff,#7c4dff,#9b63ff);
    }

    .usage-card p{
      margin-top:10px;
      font-size:13px;
      line-height:1.6;
      color:var(--muted);
    }

    .data-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .data-item{
      width:100%;
      text-align:left;
      display:flex;
      align-items:flex-start;
      gap:12px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:15px;
    }

    .data-item-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      background:#f4f6fb;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
      font-size:20px;
    }

    .data-item strong{
      display:block;
      font-size:15px;
    }

    .data-item span{
      display:block;
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.55;
    }

    .muted-center{
      margin-top:16px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
    }

    .hidden{
      display:none !important;
    }

    @media (max-width:560px){
      .app{
        padding:0;
      }
      .phone{
        width:100%;
        height:100vh;
        max-height:none;
        border-radius:0;
        border:none;
      }
      .model-menu{
        left:12px;
        right:12px;
        top:68px;
      }
    }

    ::-webkit-scrollbar{
      width:6px;
      height:6px;
    }
    ::-webkit-scrollbar-thumb{
      background:#d6dbeb;
      border-radius:999px;
    }
    ::-webkit-scrollbar-track{
      background:transparent;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone" id="appShell">
      <div class="overlay" id="overlay"></div>

      <aside class="drawer" id="drawer">
        <div class="drawer-card profile-card">
          <div class="profile-left">
            <div class="profile-avatar">F</div>
            <div>
              <div class="profile-name">Filmexplian</div>
            </div>
          </div>
          <div style="font-size:20px;color:#9aa0af">›</div>
        </div>

        <button class="drawer-link">
          <div class="left">
            <span>🎵</span>
            <span>Upgrade Plan</span>
          </div>
          <span style="color:#9aa0af">›</span>
        </button>

        <button class="drawer-link">
          <div class="left">
            <span>🕷️</span>
            <span>Kimi Claw</span>
            <span class="mini-badge">Beta</span>
          </div>
          <span style="color:#9aa0af">+ Add</span>
        </button>

        <button class="drawer-link" id="newChatBtn">
          <div class="left">
            <span>➕</span>
            <span>New Chat</span>
          </div>
          <span style="color:#9aa0af">›</span>
        </button>

        <div class="history-section">
          <div class="history-top">
            <strong>Chat history</strong>
            <span class="search-mini">⌕ Search</span>
          </div>
          <div class="history-date">Today</div>
          <div id="historyList">
            <div class="history-item">बँकएंड फ्रंटएंड जिप आला</div>
            <div class="history-item">TueexpertPython...</div>
            <div class="history-item">पूर्ण वेब ऐप बनाना</div>
          </div>
        </div>
      </aside>

      <div class="model-menu" id="modelMenu">
        <button class="model-option active" data-model="instant">
          <div>
            <strong>K2.6 Instant</strong>
            <span>Quick response</span>
          </div>
          <div class="check">✓</div>
        </button>

        <button class="model-option" data-model="thinking">
          <div>
            <strong>K2.6 Thinking</strong>
            <span>Deep thinking for complex questions</span>
          </div>
          <div class="check">✓</div>
        </button>

        <button class="model-option" data-model="agent">
          <div>
            <strong>K2.6 Agent</strong>
            <span>Research, slides, websites, docs, sheets</span>
          </div>
          <div class="check">✓</div>
        </button>

        <button class="model-option" data-model="swarm">
          <div>
            <strong>K2.6 Agent Swarm</strong>
            <span>Large-scale search, long-form writing, batch tasks</span>
          </div>
          <div class="check">✓</div>
        </button>
      </div>

      <div class="sheet" id="attachSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Add to chat</div>

        <div class="attach-grid">
          <button class="attach-card" data-attach="camera">📷 Camera</button>
          <button class="attach-card" data-attach="photos">🖼️ Photos</button>
          <button class="attach-card" data-attach="files">📁 Files</button>
          <button class="attach-card" data-attach="wechat">💬 WeChat files</button>
          <button class="attach-card" data-attach="call">📞 Call</button>
          <button class="attach-card" data-attach="presets">🧩 Presets</button>
        </div>

        <button class="sheet-row" id="webSearchSheetBtn">
          <div class="sheet-row-left">🌐 Web search</div>
          <div style="color:#9aa0af">›</div>
        </button>

        <button class="sheet-row" id="professionalDataBtn">
          <div class="sheet-row-left">📊 Professional data</div>
          <div style="color:#9aa0af">›</div>
        </button>
      </div>

      <div class="sheet" id="dataSheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Professional data</div>
        <div class="usage-card">
          <strong>Usage 1.04%</strong>
          <div class="progress"><div></div></div>
          <p>Reset: May 30 · <span style="color:#2563eb;font-weight:700">Upgrade</span> for more</p>
        </div>
        <div class="data-list">
          <button class="data-item" data-prefill="Show me latest global finance data trends">🌍 Global Finance Data</button>
          <button class="data-item" data-prefill="Show me stock finance data for major companies">📈 Stock Finance Data</button>
          <button class="data-item" data-prefill="Find academic data and papers on AI agents">🎓 Academic Data</button>
          <button class="data-item" data-prefill="Show me world bank data for GDP population employment">🏦 World Bank Data</button>
        </div>
      </div>

      <header class="topbar">
        <div class="top-left">
          <button class="icon-btn" id="menuBtn">☰</button>
          <button class="title-trigger" id="modelTrigger">
            <div class="title-wrap">
              <div class="top-title" id="modelTitle">Kimi <span style="font-weight:400;color:#8a90a0">K2.6 Instant</span> <span style="font-size:13px;">›</span></div>
            </div>
          </button>
        </div>
        <div class="top-right">
          <button class="icon-btn" id="voiceBtn">🔊</button>
          <button class="icon-btn" id="topPlusBtn">⊕</button>
        </div>
      </header>

      <main class="main" id="mainScroll">
        <section class="home-view" id="homeView">
          <div class="kimi-logo"></div>
          <div class="welcome-text">
            Hi Filmexplian, Kimi sees images & videos. Agent Swarm handles complex tasks in parallel.
          </div>
          <div class="feature-list">
            <button class="feature-pill" data-prefill="Help me use Kimi Docs for document analysis">📄 Kimi Docs — AI Document Agent</button>
            <button class="feature-pill" data-prefill="Help me write code with Kimi Code">💻 Kimi Code — AI Coding Agent</button>
            <button class="feature-pill" data-prefill="Explain how Kimi Claw works for crawling websites">🕸️ Kimi Claw — cloud crawler</button>
          </div>
        </section>
        <section class="chat-view" id="chatView">
          <div class="messages" id="messagesContainer"></div>
        </section>
      </main>

      <div class="bottom-wrap">
        <div class="quick-row">
          <button class="quick-chip" data-quick="agent">🤖 Agent</button>
          <button class="quick-chip" data-quick="slides">🖥️ Slides</button>
          <button class="quick-chip" data-quick="claw">🕷️ Kimi Claw</button>
          <button class="quick-chip" data-quick="swarm">🐝 Agent Swarm</button>
          <button class="quick-chip" data-quick="web">🌐 Web</button>
        </div>
        <div class="composer">
          <div class="composer-left">))</div>
          <textarea id="userInput" rows="1" placeholder="Ask anything, attach files too..."></textarea>
          <button class="composer-action secondary" id="composerAction">＋</button>
        </div>
      </div>
      <input type="file" id="fileInput" multiple class="hidden" />
    </div>
  </div>

  <script>
    // ============================================
    // BACKEND CONNECTION - NO API KEYS HERE!
    // ============================================
    const BACKEND_URL = "https://kimibg1.onrender.com";
    
    let currentModel = "instant";
    let conversation = [];
    let messagesContainer = document.getElementById("messagesContainer");
    let homeView = document.getElementById("homeView");
    let chatView = document.getElementById("chatView");
    let userInput = document.getElementById("userInput");
    let composerAction = document.getElementById("composerAction");
    let fileInput = document.getElementById("fileInput");
    let mainScroll = document.getElementById("mainScroll");

    function getSystemPromptForModel(m){
      const prompts = {
        instant: "You are K2.6 Instant mode. Respond quickly, clearly, and concisely.",
        thinking: "You are K2.6 Thinking mode. Provide deep reasoning and step-by-step explanations.",
        agent: "You are K2.6 Agent mode. Help with research, documents, websites, and structured outputs.",
        swarm: "You are K2.6 Agent Swarm mode. Handle large tasks, long-form content, and multi-step research."
      };
      return prompts[m] || prompts.instant;
    }

    function rebuildSystemMessage(){
      if(conversation.length > 0 && conversation[0]?.role === "system"){
        conversation[0].content = getSystemPromptForModel(currentModel);
      } else {
        conversation.unshift({ role: "system", content: getSystemPromptForModel(currentModel) });
      }
    }

    function escapeHtml(t){ return t.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
    
    function formatContent(text){
      let safe = escapeHtml(text).replace(/\n/g, '<br>');
      safe = safe.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code)}</code></pre>`);
      safe = safe.replace(/`([^`]+)`/g, "<code>$1</code>");
      return safe;
    }

    let overlay = document.getElementById("overlay");
    let drawer = document.getElementById("drawer");
    let modelMenu = document.getElementById("modelMenu");
    let attachSheet = document.getElementById("attachSheet");
    let dataSheet = document.getElementById("dataSheet");

    function closeAllSheets(){ overlay.classList.remove("show"); drawer.classList.remove("show"); modelMenu.classList.remove("show"); attachSheet.classList.remove("show"); dataSheet.classList.remove("show"); }
    function openOverlay(){ overlay.classList.add("show"); }

    document.getElementById("menuBtn").onclick = () => { openOverlay(); drawer.classList.add("show"); };
    document.getElementById("modelTrigger").onclick = () => { openOverlay(); modelMenu.classList.add("show"); };
    document.getElementById("topPlusBtn").onclick = () => { openOverlay(); attachSheet.classList.add("show"); };
    overlay.onclick = closeAllSheets;

    document.querySelectorAll(".model-option").forEach(btn=>{
      btn.onclick = () => {
        currentModel = btn.dataset.model;
        rebuildSystemMessage();
        let titleSpan = document.querySelector("#modelTitle span");
        if(titleSpan) titleSpan.innerText = `K2.6 ${currentModel === "instant" ? "Instant" : currentModel === "thinking" ? "Thinking" : currentModel === "agent" ? "Agent" : "Agent Swarm"}`;
        document.querySelectorAll(".model-option").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        closeAllSheets();
      };
    });

    let voiceEnabled = true;
    document.getElementById("voiceBtn").onclick = () => { voiceEnabled = !voiceEnabled; document.getElementById("voiceBtn").innerText = voiceEnabled ? "🔊" : "🔇"; };

    function showChat(){ homeView.classList.add("hidden"); chatView.classList.add("active"); }
    function showHome(){ homeView.classList.remove("hidden"); chatView.classList.remove("active"); }

    function addMessage(role, content){
      showChat();
      let msgDiv = document.createElement("div");
      msgDiv.className = `message ${role}`;
      let avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerText = role === "user" ? "👤" : "🤖";
      let bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.innerHTML = formatContent(content);
      if(role === "user"){ msgDiv.appendChild(bubble); msgDiv.appendChild(avatar); } 
      else { msgDiv.appendChild(avatar); msgDiv.appendChild(bubble); }
      messagesContainer.appendChild(msgDiv);
      requestAnimationFrame(()=> mainScroll.scrollTop = mainScroll.scrollHeight);
      return { update: (newContent) => { bubble.innerHTML = formatContent(newContent); mainScroll.scrollTop = mainScroll.scrollHeight; } };
    }

    // ============================================
    // BACKEND API CALL - Keys are safe on server
    // ============================================
    async function callKimi(messagesArray){
      try {
        let temp = currentModel === "instant" ? 0.35 : currentModel === "thinking" ? 0.8 : 0.65;
        let maxT = currentModel === "swarm" ? 5000 : 2800;
        
        const response = await fetch(`${BACKEND_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: messagesArray,
            model: "moonshotai/kimi-k2.6",
            temperature: temp,
            max_tokens: maxT
          })
        });
        
        if(!response.ok){
          const errorData = await response.json();
          throw new Error(errorData.error || `Server error: ${response.status}`);
        }
        
        const data = await response.json();
        if(data.success){
          return data.content;
        } else {
          throw new Error(data.error || "Unknown error from backend");
        }
      } catch(err){
        console.error("Backend API error:", err);
        throw new Error(`❌ ${err.message}. Make sure backend is running at ${BACKEND_URL}`);
      }
    }

    function saveHistory(title){
      let trimmed = title.trim().slice(0,50);
      if(!trimmed) return;
      let items = JSON.parse(localStorage.getItem("kimi_ui_chat_history") || "[]");
      items = items.filter(i=> i !== trimmed);
      items.unshift(trimmed);
      items = items.slice(0,8);
      localStorage.setItem("kimi_ui_chat_history", JSON.stringify(items));
      renderHistory();
    }

    function renderHistory(){
      let items = JSON.parse(localStorage.getItem("kimi_ui_chat_history") || "[]");
      let historyDiv = document.getElementById("historyList");
      if(!items.length){
        historyDiv.innerHTML = `<div class="history-item">🌟 Ask about film analysis</div><div class="history-item">Kimi Docs demo</div>`;
        return;
      }
      historyDiv.innerHTML = items.map(txt => `<div class="history-item">${escapeHtml(txt)}</div>`).join("");
      document.querySelectorAll("#historyList .history-item").forEach(el=>{
        el.addEventListener("click", ()=>{ prefill(el.innerText); closeAllSheets(); });
      });
    }

    function resetChat(){
      messagesContainer.innerHTML = "";
      conversation = [{ role: "system", content: getSystemPromptForModel(currentModel) }];
      showHome();
      closeAllSheets();
    }
    document.getElementById("newChatBtn").onclick = resetChat;

    function prefill(txt){ userInput.value = txt; autoResize(); userInput.focus(); updateComposerBtn(); }

    function buildPromptAugmented(raw){
      let direction = `\n[Mode: ${currentModel.toUpperCase()}] `;
      if(currentModel === "instant") direction += "Respond directly and concisely.";
      else if(currentModel === "thinking") direction += "Provide step-by-step reasoning.";
      else if(currentModel === "agent") direction += "Give structured, actionable results.";
      else direction += "Handle extended analysis & multi-step tasks.";
      return raw + direction;
    }

    async function sendMessage(){
      let raw = userInput.value.trim();
      if(!raw) return;
      addMessage("user", raw);
      saveHistory(raw);
      let augmented = buildPromptAugmented(raw);
      conversation.push({ role: "user", content: augmented });
      userInput.value = ""; autoResize(); updateComposerBtn();

      let assistantMsg = addMessage("assistant", "⏳ K2.6 is thinking...");
      try{
        let reply = await callKimi(conversation);
        assistantMsg.update(reply);
        conversation.push({ role: "assistant", content: reply });
      }catch(err){
        assistantMsg.update(`❌ ${err.message}`);
      }
    }

    function autoResize(){
      userInput.style.height = "24px";
      userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
    }
    function updateComposerBtn(){
      if(userInput.value.trim().length > 0){
        composerAction.innerText = "➜";
        composerAction.classList.remove("secondary");
        composerAction.classList.add("primary");
      } else {
        composerAction.innerText = "＋";
        composerAction.classList.remove("primary");
        composerAction.classList.add("secondary");
      }
    }
    userInput.addEventListener("input", ()=>{ autoResize(); updateComposerBtn(); });
    userInput.addEventListener("keydown", (e)=>{ if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); } });
    composerAction.onclick = () => { if(userInput.value.trim()) sendMessage(); else { openOverlay(); attachSheet.classList.add("show"); } };

    document.querySelectorAll("[data-prefill]").forEach(b => {
      b.onclick = () => { prefill(b.dataset.prefill || b.innerText); closeAllSheets(); };
    });
    document.querySelectorAll(".quick-chip").forEach(btn => {
      btn.onclick = () => {
        let kind = btn.dataset.quick;
        if(kind === "agent"){ setModelSilent("agent"); prefill("⚡ Agent mode: help me research "); }
        else if(kind === "slides"){ setModelSilent("agent"); prefill("Create presentation slides about "); }
        else if(kind === "claw"){ prefill("Use Kimi Claw to crawl website: "); }
        else if(kind === "swarm"){ setModelSilent("swarm"); prefill("🐝 Swarm mode: deep research on "); }
        else if(kind === "web"){ prefill("🌐 Web search: "); }
        closeAllSheets();
      };
    });
    function setModelSilent(m){ currentModel = m; rebuildSystemMessage(); document.querySelectorAll(".model-option").forEach(b=>b.classList.remove("active")); document.querySelector(`.model-option[data-model="${m}"]`).classList.add("active"); let titleSpan = document.querySelector("#modelTitle span"); if(titleSpan) titleSpan.innerText = `K2.6 ${m === "instant" ? "Instant" : m === "thinking" ? "Thinking" : m === "agent" ? "Agent" : "Agent Swarm"}`; }

    document.querySelectorAll(".attach-card").forEach(card => {
      card.onclick = () => {
        let type = card.dataset.attach;
        if(type === "camera" || type === "photos" || type === "files"){ closeAllSheets(); fileInput.click(); }
        else if(type === "call"){ closeAllSheets(); addMessage("assistant", "📞 Call function demo — integrate your telephony here."); }
        else if(type === "presets"){ closeAllSheets(); prefill("🧩 Use premium preset: summarize and act as pro editor. "); }
        else { closeAllSheets(); addMessage("assistant", `✨ ${type} attachment ready, you can now ask me to process it.`); }
      };
    });
    document.getElementById("webSearchSheetBtn").onclick = () => { closeAllSheets(); prefill("Search the web for "); };
    document.getElementById("professionalDataBtn").onclick = () => { openOverlay(); dataSheet.classList.add("show"); };
    document.querySelectorAll(".data-item").forEach(item => {
      item.onclick = () => { closeAllSheets(); prefill(item.dataset.prefill || item.innerText); };
    });

    fileInput.addEventListener("change", async (e)=>{
      let files = Array.from(e.target.files);
      if(!files.length) return;
      closeAllSheets();
      for(let f of files){
        addMessage("user", `📎 Attached: ${f.name}`);
        if(f.type.startsWith("text/") || /\.(txt|js|html|css|json|md|py|java|cpp)$/i.test(f.name)){
          let reader = new FileReader();
          reader.onload = async (ev) => {
            let text = (ev.target.result || "").slice(0, 6000);
            let loading = addMessage("assistant", `⏳ Analyzing ${f.name} ...`);
            try{
              let prompt = `Analyze this file "${f.name}" and provide a clear summary:\n${text}`;
              let tempConv = [{ role: "system", content: getSystemPromptForModel(currentModel) }, { role: "user", content: prompt }];
              let reply = await callKimi(tempConv);
              loading.update(`📄 ${f.name}\n\n${reply}`);
            }catch(err){ loading.update(`❌ ${err.message}`); }
          };
          reader.readAsText(f);
        } else {
          addMessage("assistant", `🖼️ File "${f.name}" attached. You can describe what to do with it.`);
        }
      }
      fileInput.value = "";
    });

    // Check backend health on load
    async function checkBackend(){
      try {
        const res = await fetch(`${BACKEND_URL}/health`);
        const data = await res.json();
        console.log("✅ Backend connected:", data);
      } catch(err){
        console.warn("⚠️ Backend not reachable:", err);
      }
    }
    
    rebuildSystemMessage();
    renderHistory();
    autoResize();
    updateComposerBtn();
    showHome();
    checkBackend();
  </script>
</body>
</html>
